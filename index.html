<!DOCTYPE html>
<html>
  <head>
    <title>AR Smart Menu: Pure JS Touch V3</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      /* --- MANDATORY CSS FIXES --- */
      video { max-width: none !important; }
      .a-canvas { width: 100% !important; height: 100% !important; }

      /* Lock the UI to the bottom of the screen, floating above the camera */
      .ui-layer {
        position: fixed; 
        z-index: 9999;   
        bottom: 0;
        left: 0;
        width: 100%;
        pointer-events: none; /* Lets you tap through the empty space */
      }
      .interactive-btn { pointer-events: auto; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden; background-color: black;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="food-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF/Avocado.gltf"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        
        <a-entity
          id="avocado-model"
          position="0 0.5 0"
          scale="10 10 10"
          gltf-model="#food-model">
        </a-entity>
        
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <div class="ui-layer p-4 pb-8">
      <div class="bg-white/30 backdrop-blur-md border border-white/40 p-5 rounded-3xl shadow-2xl mx-2">
        <div class="flex justify-between items-start">
          <div>
            <h1 class="text-2xl font-extrabold text-gray-900 drop-shadow-md">Butter Chicken</h1>
            <p class="text-gray-900 font-bold mt-1 drop-shadow-md">₹350 • 830 kcal</p>
          </div>
          <span class="bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-md">Heavy</span>
        </div>
        <p class="text-sm text-gray-900 mt-2 font-medium drop-shadow-sm">Rich, creamy tomato curry with tender chicken. Perfectly spiced.</p>
        <div class="mt-4 flex gap-3 interactive-btn">
          <button class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition transform active:scale-95">
            Add to Cart
          </button>
          <button class="bg-white/80 hover:bg-white text-gray-900 font-bold py-3 px-4 rounded-xl shadow-lg transition active:scale-95">
            ⚙️ Customize
          </button>
        </div>
      </div>
    </div>

    <script>
      const scene = document.querySelector('a-scene');
      const model = document.querySelector('#avocado-model');
      
      let isDragging = false;
      let startX = 0;
      let currentRotation = 0; // Current rotation of the model on the Y axis
      const sensitivity = 0.5;   // Adjust this to make rotation faster or slower

      // 1. Detect when the user touches the screen
      scene.addEventListener('touchstart', (e) => {
          isDragging = true;
          // Remember exactly where their finger started
          startX = e.touches[0].pageX;
      });

      // 2. Detect when they move their finger
      scene.addEventListener('touchmove', (e) => {
          if (isDragging) {
              // Calculate how far they moved since the last frame
              let currentX = e.touches[0].pageX;
              let deltaX = currentX - startX;
              
              // Update the total rotation based on that movement
              currentRotation += deltaX * sensitivity;
              
              // Apply the new rotation to the 3D model (only on Y axis)
              // We must use backticks ` ` to combine strings and variables in JS
              model.setAttribute('rotation', `0 ${currentRotation} 0`);
              
              // Important: Reset startX for the next frame for smoother motion
              startX = currentX;
          }
      });

      // 3. Detect when they lift their finger
      scene.addEventListener('touchend', () => {
          isDragging = false;
      });
    </script>
    
  </body>
</html>
