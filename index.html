<!DOCTYPE html>
<html>
  <head>
    <title>AR Smart Menu</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      video { max-width: none !important; }
      .ui-layer {
        position: fixed; 
        z-index: 9999;   
        bottom: 20px;
        left: 0;
        width: 100%;
        pointer-events: none; 
      }
      .interactive-btn { pointer-events: auto; }
      /* Welcome Screen Overlay */
      #welcome-screen {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden; background-color: black;">

    <!-- 1. Welcome Note Overlay -->
    <div id="welcome-screen" class="p-6">
      <h1 class="text-4xl font-black mb-4 text-orange-500">WELCOME</h1>
      <p class="text-lg mb-8 text-gray-300">Experience our menu in Augmented Reality. Point your camera at the marker after clicking next.</p>
      <button onclick="startApp()" class="bg-orange-500 text-white px-12 py-4 rounded-full font-bold text-xl shadow-lg active:scale-95 transition">
        NEXT
      </button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <!-- Using a Waffle-like model or placeholder -->
        <a-asset-item id="food-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF/Avocado.gltf"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <!-- The Model -->
        
        
      </a-marker>

      
    </a-scene>

    <!-- 2. Main Menu UI -->
    <div class="ui-layer px-4">
      <div class="bg-black/70 backdrop-blur-lg border border-white/20 p-5 rounded-3xl shadow-2xl">
        <div class="flex justify-between items-center mb-4">
          <h2 id="item-name" class="text-xl font-bold text-white">Galaxy Waffle</h2>
          <span class="text-orange-400 font-bold">₹280</span>
        </div>
        
        <!-- Category Toggles -->
        <div class="flex gap-2 mb-4 interactive-btn overflow-x-auto pb-2">
          <button class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-bold min-w-fit">Waffles</button>
          <button class="bg-white/10 text-white px-4 py-2 rounded-lg text-sm font-bold min-w-fit">Ice Cream</button>
          <button class="bg-white/10 text-white px-4 py-2 rounded-lg text-sm font-bold min-w-fit">Drinks</button>
        </div>

        <button onclick="orderFood()" class="interactive-btn w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl transition active:scale-95">
          ADD TO CART & ORDER
        </button>
      </div>
    </div>

    <script>
      const model = document.querySelector('#menu-model');
      const welcome = document.querySelector('#welcome-screen');
      
      function startApp() {
        welcome.style.display = 'none';
      }

      function orderFood() {
        const item = document.getElementById('item-name').innerText;
        alert("Order for " + item + " sent to backend!");
        // Here you would add your fetch() call to your Node.js/Firebase backend
      }

      // --- FIXED 360 ROTATION LOGIC ---
      let isDragging = false;
      let previousMouseX = 0;

      window.addEventListener('touchstart', (e) => {
        isDragging = true;
        previousMouseX = e.touches[0].clientX;
      });

      window.addEventListener('touchmove', (e) => {
        if (isDragging && model) {
          const deltaX = e.touches[0].clientX - previousMouseX;
          
          // Get current rotation
          let rotation = model.getAttribute('rotation');
          
          // Update Y rotation (360 degrees)
          rotation.y += deltaX * 0.5; 
          
          model.setAttribute('rotation', rotation);
          previousMouseX = e.touches[0].clientX;
        }
      });

      window.addEventListener('touchend', () => {
        isDragging = false;
      });
    </script>
  </body>
</html>
