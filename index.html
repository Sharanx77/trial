<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>In-Site Markerless AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene webxr="optionalFeatures: hit-test;" ar-hit-test="target: #drone-model;">
        
        <a-assets>
            <a-asset-item id="drone" src="https://cdn.aframe.io/test-models/models/glTF-2.0/virtualcity/VC.gltf"></a-asset-item>
        </a-assets>

        <a-entity camera></a-entity>

        <a-entity id="drone-model" 
                  gltf-model="#drone" 
                  scale="0.1 0.1 0.1" 
                  visible="false">
        </a-entity>

        <a-entity id="reticle" 
                  geometry="primitive: ring; radiusInner: 0.04; radiusOuter: 0.05" 
                  material="color: #007bff; shader: flat" 
                  rotation="-90 0 0">
        </a-entity>

    </a-scene>

    <script>
        // Logic to handle the "Tap to Place"
        const scene = document.querySelector('a-scene');
        const model = document.querySelector('#drone-model');
        const reticle = document.querySelector('#reticle');

        scene.addEventListener('enter-vr', () => {
            if (scene.is('ar-mode')) {
                // When AR starts, look for surfaces
                scene.addEventListener('ar-hit-test-select', (e) => {
                    // Place model where the reticle is
                    model.setAttribute('position', e.detail.position);
                    model.setAttribute('visible', 'true');
                });
            }
        });
    </script>
</body>
</html>
