<!DOCTYPE html>
<html>
  <head>
    <title>AR Smart Menu: Fixed & Interactive</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      video { max-width: none !important; }
      .a-canvas { width: 100% !important; height: 100% !important; }
      .ui-layer {
        position: fixed; 
        z-index: 9999;   
        bottom: 0;
        left: 0;
        width: 100%;
        pointer-events: none; 
      }
      .interactive-btn { pointer-events: auto; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden; background-color: black;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <a-asset-item id="avocado-asset" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF/Avocado.gltf"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <a-entity id="menu-model" gltf-model="#avocado-asset" scale="15 15 15" position="0 0 0"></a-entity>
      
        <a-entity id="xray-labels" visible="false">
            <a-entity line="start: 0 0.5 0; end: 0.5 1 0; color: white" 
                      text="value: High in Healthy Fats; align: center; width: 4"
                      position="0.8 1.2 0">
            </a-entity>
            <a-entity line="start: 0 0.2 0; end: -0.5 0.8 0; color: white" 
                      text="value: Organic & Fresh; align: center; width: 4"
                      position="-0.8 1.0 0">
            </a-entity>
          </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <div class="ui-layer p-4 pb-8">
      <div class="bg-white/30 backdrop-blur-md border border-white/40 p-5 rounded-3xl shadow-2xl mx-2">
        <div class="flex justify-between items-start">
          <div>
            <h1 class="text-2xl font-extrabold text-white drop-shadow-md">AR Avocado</h1>
            <p class="text-white font-bold mt-1 drop-shadow-md">₹350 • 160 kcal</p>
          </div>
          <span class="bg-green-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-md">Healthy</span>
        </div>
        
        <div class="mt-4 flex gap-3 interactive-btn">
          <button onclick="alert('Added to cart!')" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition transform active:scale-95">
            Add to Cart
          </button>
          <button id="customize-btn" class="bg-white/80 hover:bg-white text-gray-900 font-bold py-3 px-4 rounded-xl shadow-lg transition active:scale-95">
            ⚙️ X-Ray
          </button>
        </div>
      </div>
    </div>

    <script>
      const scene = document.querySelector('a-scene');
      const model = document.querySelector('#menu-model');
      const xray = document.querySelector('#xray-labels');
      const custBtn = document.querySelector('#customize-btn');
      
      let isDragging = false;
      let startX = 0;
      let currentRotation = 0;
      const sensitivity = 0.5;

      // --- ROTATION LOGIC ---
      scene.addEventListener('touchstart', (e) => {
          isDragging = true;
          startX = e.touches[0].pageX;
      });

      scene.addEventListener('touchmove', (e) => {
          if (isDragging && model) {
              let currentX = e.touches[0].pageX;
              let deltaX = currentX - startX;
              currentRotation += deltaX * sensitivity;
              model.setAttribute('rotation', `0 ${currentRotation} 0`);
              startX = currentX;
          }
      });

      scene.addEventListener('touchend', () => { isDragging = false; });

      // --- UI INTERACTION ---
      custBtn.addEventListener('click', () => {
        const isVisible = xray.getAttribute('visible');
        xray.setAttribute('visible', !isVisible);
        custBtn.classList.toggle('bg-orange-200');
      });
    </script>
  </body>
</html>
