<!DOCTYPE html>
<html>
  <head>
    <title>AR Smart Menu: Interaction V1</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio/master/src/aframe/gesture-detector.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio/master/src/aframe/gesture-handler.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      /* --- MANDATORY CSS FIXES --- */
      
      /* Stop Tailwind from squishing the AR camera feed */
      video {
        max-width: none !important;
      }

      /* Ensure the 3D canvas fills the entire screen */
      .a-canvas {
        width: 100% !important;
        height: 100% !important;
      }

      /* Lock the UI to the bottom of the screen, floating above the camera */
      .ui-layer {
        position: fixed; 
        z-index: 9999;   
        bottom: 0;
        left: 0;
        width: 100%;
        pointer-events: none; /* Lets you tap through the empty space */
      }
      
      /* Makes the buttons inside the card actually clickable */
      .interactive-btn {
        pointer-events: auto; 
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden; background-color: black;">

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      gesture-detector>
      
      <a-assets>
        <a-asset-item id="food-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF/Avocado.gltf"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        
        <a-entity 
          gltf-model="#food-model" 
          scale="10 10 10" 
          position="0 0.5 0" 
          class="clickable"
          gesture-handler>
        </a-entity>
        
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <div class="ui-layer p-4 pb-8">
      <div class="bg-white/30 backdrop-blur-md border border-white/40 p-5 rounded-3xl shadow-2xl mx-2">
        
        <div class="flex justify-between items-start">
          <div>
            <h1 class="text-2xl font-extrabold text-gray-900 drop-shadow-md">Butter Chicken</h1>
            <p class="text-gray-900 font-bold mt-1 drop-shadow-md">₹350 • 830 kcal</p>
          </div>
          <span class="bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-md">Heavy</span>
        </div>
        
        <p class="text-sm text-gray-900 mt-2 font-medium drop-shadow-sm">Rich, creamy tomato curry with tender chicken. Perfectly spiced.</p>
        
        <div class="mt-4 flex gap-3 interactive-btn">
          <button class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition transform active:scale-95">
            Add to Cart
          </button>
          <button class="bg-white/80 hover:bg-white text-gray-900 font-bold py-3 px-4 rounded-xl shadow-lg transition active:scale-95">
            ⚙️ Customize
          </button>
        </div>
        
      </div>
    </div>

  </body>
</html>
